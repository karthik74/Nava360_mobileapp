name: nava360
description: Nava360 mobile app — employee self-service and manager approvals.
publish_to: "none"
version: 0.1.2+2

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.4.3+1

  # WebSocket for real-time chat
  web_socket_channel: ^3.0.1

  # Storage
  flutter_secure_storage: ^9.2.2

  # Geolocation for punch in/out
  geolocator: ^12.0.0

  # Credit-SMS tracking: read bank credit SMS (Android only) + hash for de-dupe.
  # `another_telephony` is the maintained fork of the abandoned `telephony`.
  another_telephony: ^0.4.1
  crypto: ^3.0.3

  # Battery-optimisation exemption prompt (reliable background tracking)
  permission_handler: ^11.3.1

  # Reverse-geocode check-in coordinates into a readable place name
  geocoding: ^3.0.0

  # Task form attachments — capture photos and pick documents
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Formatting
  intl: ^0.19.0

  # URL Launcher
  url_launcher: ^6.3.0

  # App version / build number for the backend update check
  package_info_plus: ^8.0.2

  # Payslip PDF download: save to disk + open in the system viewer
  path_provider: ^2.1.4
  open_filex: ^4.5.0

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
    - assets/logo.png
