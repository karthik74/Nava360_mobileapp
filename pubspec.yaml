name: nava360
description: Nava360 mobile app — employee self-service and manager approvals.
publish_to: "none"
version: 0.1.18+18

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.4.3+1

  # WebSocket for real-time chat
  web_socket_channel: ^3.0.1

  # Storage
  flutter_secure_storage: ^9.2.2

  # Optional biometric login (mobile only) — on-device fingerprint / Face ID.
  # local_auth never exposes biometric data; it only returns pass/fail.
  local_auth: ^2.3.0
  # Stable device name/platform for the "Registered devices" list.
  device_info_plus: ^10.1.2

  # Geolocation for punch in/out
  geolocator: ^12.0.0

  # OTP auto-read via Google's SMS User Consent / Retriever APIs. No READ_SMS
  # permission, so it's allowed by Play Protect (used on the OTP screens).
  smart_auth: ^2.0.0

  # Battery-optimisation exemption prompt (reliable background tracking)
  permission_handler: ^11.3.1

  # Reverse-geocode check-in coordinates into a readable place name
  geocoding: ^3.0.0

  # Task form attachments — capture photos and pick documents
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Formatting
  intl: ^0.19.0

  # MIS (Grow With Me) analytics charts — bar / line trend
  fl_chart: ^0.68.0

  # MIS branch locator map (OpenStreetMap tiles — no API key required)
  flutter_map: ^6.2.1
  latlong2: ^0.9.1

  # URL Launcher
  url_launcher: ^6.3.0

  # Render rich-text/HTML announcement bodies (pure Dart, no native plugin)
  flutter_widget_from_html_core: ^0.15.2

  # App version / build number for the backend update check
  package_info_plus: ^8.0.2

  # Google Play in-app updates (Android only; Play-compliant, no sideloading)
  in_app_update: ^4.2.5

  # Payslip PDF download: save to disk + open in the system viewer
  path_provider: ^2.1.4
  open_filex: ^4.5.0

  # In-app, view-only PDF rendering (company policies + whistleblower evidence)
  flutter_pdfview: ^1.3.2

  # Whistleblower voice evidence: record + play back audio in-app
  record: ^6.0.0
  audioplayers: ^6.1.0

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
    - assets/logo.png
    # Branded app-opening splash / loading logo (see AppLoadingScreen).
    - assets/images/nava360_logo.png
    # Nava360SplashScreen split assets: rotating outer ring + static centre.
    # NOTE: these are currently placeholders (full logo) — replace with the
    # transparent ring-only and centre-only PNGs for the ring-spin effect.
    - assets/nava360_ring.png
    - assets/nava360_center.png
