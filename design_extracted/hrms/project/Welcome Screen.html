<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nava360 · Welcome Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Roboto', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  @keyframes navaspin { to { transform: rotate(360deg); } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="home-screen.jsx"></script>
<script type="text/babel" src="welcome-screens.jsx"></script>
<script type="text/babel">
  const { useState } = React;

  // Bare welcome screen inside an iOS device frame (no nav title → full bleed).
  function Phone({ children }) {
    return (
      <IOSDevice width={402} height={874}>
        <div style={{ position: 'absolute', inset: 0 }}>{children}</div>
      </IOSDevice>
    );
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="welcome" title="Nava360 — Welcome Screen"
          subtitle="Three directions on the app's glass-morphism system. Tap Get Started on any phone to flow into the login screen.">
          <DCArtboard id="a" label="A · Hero Band — matches login" width={402} height={874}>
            <Phone><Flow Welcome={WelcomeA} /></Phone>
          </DCArtboard>
          <DCArtboard id="b" label="B · Glass Orb — logo-forward" width={402} height={874}>
            <Phone><Flow Welcome={WelcomeB} /></Phone>
          </DCArtboard>
          <DCArtboard id="c" label="C · Field-Ready — teal-led, bold" width={402} height={874}>
            <Phone><Flow Welcome={WelcomeC} /></Phone>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
